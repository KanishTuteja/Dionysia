<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dionysia — Welcome back</title>
<meta name="theme-color" content="#0a0707" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'><rect width='320' height='320' rx='48' fill='%230a0707'/><path d='M30 275 L126 275 L76 183 Z' fill='%236b1220'/><path d='M160 92 L244 240 L76 240 Z' stroke='%23c9a35a' stroke-width='10' fill='none' stroke-linejoin='miter'/><path d='M160 30 L290 275 L126 275 L76 183 Z' stroke='%23f3eadd' stroke-width='12' fill='none' stroke-linejoin='miter'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:#0a0707;min-height:100%}
  body{
    min-height:100vh;width:100%;background:#0a0707;color:#f3eadd;
    font-family:'Inter',system-ui,sans-serif;font-weight:300;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:2em;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 50%, rgba(201,163,90,0.08) 0%, transparent 60%);
    -webkit-font-smoothing:antialiased;
  }
  .logo svg{width:64px;height:64px;margin-bottom:2.4em;animation:breathe 3s ease-in-out infinite}
  @keyframes breathe{
    0%,100%{opacity:0.7;transform:scale(1)}
    50%{opacity:1;transform:scale(1.04)}
  }
  .word{font-family:'Cormorant Garamond',serif;font-size:36px;letter-spacing:0.2em;margin-bottom:1.4em}
  .status{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;
    color:#a99c8c;line-height:1.5;max-width:380px;
  }
  .err{color:#8b1a2b}
  .small{
    font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#6f6457;
    margin-top:1.6em;
  }
  a{color:#c9a35a;text-decoration:none;border-bottom:1px solid rgba(201,163,90,0.3)}
</style>
</head>
<body>

<div class="logo">
  <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
    <path d="M30 275 L126 275 L76 183 Z" fill="#6b1220"/>
    <path d="M160 92 L244 240 L76 240 Z" stroke="#c9a35a" stroke-width="10" fill="none" stroke-linejoin="miter"/>
    <path d="M160 30 L290 275 L126 275 L76 183 Z" stroke="#f3eadd" stroke-width="12" fill="none" stroke-linejoin="miter"/>
  </svg>
</div>

<div class="word">DIONYSIA</div>
<div class="status" id="status">Welcome back. Opening your screening room&hellip;</div>
<div class="small" id="small"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============ SUPABASE CONFIG ============
  const SUPABASE_URL  = "https://zjdraojepoaajgwrstkj.supabase.co";
  const SUPABASE_ANON = "sb_publishable_bCodjhel8DZq00LRRApvWA_xamIhN_F";
  // =========================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });

  const status = document.getElementById('status');
  const small  = document.getElementById('small');

  function fail(reason){
    status.textContent = "We couldn't sign you in.";
    status.classList.add('err');
    small.innerHTML = (reason || 'Try again') + ' &middot; <a href="/login.html">Back to sign in</a>';
  }

  (async () => {
    try {
      // Supabase auto-detects the magic link hash and sets the session.
      // Wait briefly for it to land.
      let session = null;
      for (let i = 0; i < 20; i++) {
        const { data } = await sb.auth.getSession();
        if (data.session) { session = data.session; break; }
        await new Promise(r => setTimeout(r, 150));
      }

      if (!session) { fail('Link may have expired.'); return; }

      // Optional close-circle gate: check allowed_emails table.
      // Comment out the next block to allow anyone with an email to sign in.
      const userEmail = (session.user.email || '').toLowerCase();
      const { data: allowed, error: allowedErr } = await sb
        .from('allowed_emails')
        .select('email')
        .eq('email', userEmail)
        .maybeSingle();

      if (allowedErr) {
        // RLS or table missing — fail open for now (allow the user in)
        console.warn('allowed_emails check failed:', allowedErr.message);
      } else if (!allowed) {
        // Not on the list. Sign them out and show a polite gate.
        await sb.auth.signOut();
        status.innerHTML = '<span style="font-style:italic">"By introduction only."</span>';
        small.innerHTML = 'This email isn’t on the founding list yet. <br><br>If a curator referred you, <a href="mailto:kanishtuteja@gmail.com?subject=DIONYSIA%20%E2%80%94%20Founding%20list%20request">reach out</a>.';
        return;
      }

      // All good — go to the screening room.
      location.replace('/discover.html');
    } catch (e) {
      console.error(e);
      fail(e.message || 'Unknown error.');
    }
  })();
</script>
</body>
</html>
